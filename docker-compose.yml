services:
  redis:
    image: redis:7-bookworm
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  claude-hub:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_PROXY: ${GITHUB_PROXY:-}
    container_name: claude-hub
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Mount host Claude settings directly into the non-root user's home.
      - ${HOME}/.claude/settings.json:/home/claude/.claude/settings.json:ro
      # Persist Claude session JSONL history across container restarts.
      - ${HOME}/.claude/projects:/home/claude/.claude/projects
      # Persist app working directories across container restarts.
      - ./projects:/app/projects
    command:
      - sh
      - -lc
      - |
        set -e
        mkdir -p /home/claude/.claude/projects
        chown -R claude:claude /app/projects
        chown -R claude:claude /home/claude/.claude/projects
        exec /usr/local/openresty/bin/openresty -p /app/ -c conf/nginx.conf
    restart: unless-stopped
