daemon off;
user claude claude;
worker_processes 1;
error_log /dev/stderr info;
pid logs/nginx.pid;

# Inherit env vars needed by claude subprocess
env PATH;
env HOME;
env USER;
env LOGNAME;
env SHELL;
env TERM;
env LANG;
env LC_ALL;
env ANTHROPIC_API_KEY;
env NODE_PATH;
env TMPDIR;
env XDG_CONFIG_HOME;
env XDG_DATA_HOME;
env XDG_CACHE_HOME;
env CLAUDE_CONFIG_DIR;
env CLAUDE_BIN;
env CLAUDE_HOME;
env REDIS_HOST;
env REDIS_PORT;
env REDIS_DB;
env REDIS_PASSWORD;
env REDIS_TIMEOUT_MS;
env REDIS_KEY_PREFIX;

events {
    worker_connections 1024;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    lua_package_path "$prefix/lua/?.lua;;";
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    client_max_body_size 20m;
    lua_shared_dict session_locks 10m;

    upstream nchan_redis_backend {
        nchan_redis_server redis;
    }

    # Nchan global settings
    nchan_message_buffer_length 2000;
    nchan_message_timeout 86400s;
    # Session existence is enforced in Lua before proxying to Nchan.
    # Leaving this off allows the first subscriber to create the channel
    # immediately after /api/sessions creates the Redis-backed session.

    # Access log
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" rt=$request_time';
    access_log /dev/stdout main;

    # ============================================================
    # Single server: OpenResty + Lua router + Nchan
    # Port 8080 — public facing
    # ============================================================
    server {
        listen 8080;
        server_name localhost;

        # Static files (Web UI)
        location /ui/ {
            alias html/;
            index index.html;
        }

        location = / {
            return 302 /ui/;
        }

        location = /auth {
            internal;
            proxy_pass http://127.0.0.1:8080/api/nchan/auth;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Subscriber-Type $nchan_subscriber_type;
            proxy_set_header X-Publisher-Type $nchan_publisher_type;
            proxy_set_header X-Prev-Message-Id $nchan_prev_message_id;
            proxy_set_header X-Channel-Id $nchan_channel_id;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # --- Nchan publisher for internal Lua publishes ---
        location ~ "^/nchan/pub/(?<session_id>[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12})$" {
            allow 127.0.0.1;
            deny all;
            nchan_publisher;
            nchan_channel_id $session_id;
            nchan_redis_storage_mode backup;
            nchan_redis_pass nchan_redis_backend;
        }

        # --- Subscriber: /sub/{id} -> Nchan (SSE/WebSocket) ---
        # This must come before the Lua catch-all so WebSocket upgrade works
        location ~ "^/sub/(?<session_id>[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12})$" {
            nchan_channel_id $session_id;
            nchan_authorize_request /auth;
            nchan_subscriber;
            nchan_subscriber_first_message oldest;
            nchan_redis_storage_mode backup;
            nchan_redis_pass nchan_redis_backend;
        }

        location ~ "^/sub/" {
            return 404;
        }

        # --- All API routes handled by router.lua ---
        # Matches: /api/sessions, /api/sessions/:id, /api/sessions/:id/turn, /api/nchan/auth, /api/health
        location ~ "^/api/" {
            content_by_lua_block {
                local app = require "app"
                app.dispatch()
            }
        }
    }
}
