daemon off;
user claude claude;
worker_processes 1;
error_log /dev/stderr info;
pid logs/nginx.pid;

# Inherit env vars needed by claude subprocess
env PATH;
env HOME;
env USER;
env LOGNAME;
env SHELL;
env TERM;
env LANG;
env LC_ALL;
env ANTHROPIC_API_KEY;
env NODE_PATH;
env TMPDIR;
env XDG_CONFIG_HOME;
env XDG_DATA_HOME;
env XDG_CACHE_HOME;
env CLAUDE_CONFIG_DIR;
env CLAUDE_BIN;
env CLAUDE_HOME;
env REDIS_HOST;
env REDIS_PORT;
env REDIS_DB;
env REDIS_PASSWORD;
env REDIS_TIMEOUT_MS;
env REDIS_KEY_PREFIX;

events {
    worker_connections 1024;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    lua_package_path "$prefix/lua/?.lua;;";
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    lua_shared_dict session_locks 10m;

    upstream nchan_redis_backend {
        nchan_redis_server redis;
    }

    # Nchan global settings
    nchan_message_buffer_length 2000;
    nchan_message_timeout 86400s;

    # Access log
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" rt=$request_time';
    access_log /dev/stdout main;

    # ============================================================
    # Server 1: Application server (OpenResty + Lua + router.lua)
    # Port 8080 — public facing
    # ============================================================
    server {
        listen 8080;
        server_name localhost;

        # Static files (Web UI)
        location /ui/ {
            alias html/;
            index index.html;
        }

        location = / {
            return 302 /ui/;
        }

        # --- Subscriber proxy: /sub/{id} -> Nchan (SSE/WebSocket) ---
        # This must come before the Lua catch-all so WebSocket upgrade works
        location ~ "^/sub/([a-f0-9\-]+)$" {
            proxy_pass http://127.0.0.1:8081/sub/$1;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # --- Internal: Lua -> Nchan publish ---
        location /nchan/pub/ {
            internal;
            proxy_pass http://127.0.0.1:8081/pub/;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- All API routes handled by router.lua ---
        # Matches: /api/sessions, /api/sessions/:id, /pub/:id, /api/health
        location ~ "^/(api|pub)/" {
            content_by_lua_block {
                local app = require "app"
                app.dispatch()
            }
        }
    }

    # ============================================================
    # Server 2: Nchan server (pure pub/sub)
    # Port 8081 — loopback only
    # ============================================================
    server {
        listen 127.0.0.1:8081;
        server_name _;

        location ~ "^/pub/([a-f0-9\-]+)$" {
            nchan_publisher;
            nchan_channel_id $1;
            nchan_redis_storage_mode backup;
            nchan_redis_pass nchan_redis_backend;
        }

        location ~ "^/sub/([a-f0-9\-]+)$" {
            nchan_subscriber;
            nchan_subscriber_first_message oldest;
            nchan_channel_id $1;
            nchan_redis_storage_mode backup;
            nchan_redis_pass nchan_redis_backend;
        }
    }
}
